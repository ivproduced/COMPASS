# ============================================================
# COMPASS — Cloud Build CI/CD Pipeline
# Triggered on push to main branch.
#   1. Lint
#   2. Unit tests
#   3. Build Docker image
#   4. Push to Artifact Registry
#   5. Deploy to Cloud Run
# ============================================================
steps:
  # ---- Lint ----------------------------------------------------------------
  - name: "python:3.12-slim"
    id: lint
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet ruff
        ruff check backend/ --output-format=github

  # ---- Unit tests ----------------------------------------------------------
  - name: "python:3.12-slim"
    id: unit-tests
    entrypoint: bash
    waitFor: [lint]
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt
        python -m pytest tests/ -v --tb=short \
          --ignore=tests/test_integration.py \
          -p no:warnings
    env:
      - "ENV=test"
      - "GOOGLE_CLOUD_PROJECT=compass-fedramp"
      - "GEMINI_MODEL=gemini-2.5-pro"

  # ---- Docker build --------------------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    id: build
    waitFor: [unit-tests]
    args:
      - build
      - -t
      - "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/compass-backend:${SHORT_SHA}"
      - -t
      - "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/compass-backend:latest"
      - .

  # ---- Push to Artifact Registry -------------------------------------------
  - name: "gcr.io/cloud-builders/docker"
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/compass-backend"

  # ---- Cloud Run deploy ----------------------------------------------------
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - compass-backend
      - --image=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/compass-backend:${SHORT_SHA}
      - --region=${_LOCATION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --cpu=2
      - --memory=2Gi
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},ENV=production
      - --service-account=compass-backend@${PROJECT_ID}.iam.gserviceaccount.com

substitutions:
  _LOCATION: us-central1
  _REPOSITORY: compass

images:
  - "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/compass-backend:${SHORT_SHA}"
  - "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/compass-backend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
